<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FuCafé Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>☕ FuCafé Admin</h2>

        <ul>
            <li onclick="showSection('dashboard')">Dashboard</li>
            <li onclick="showSection('orders')">Orders</li>
            <li onclick="showSection('bookings')">Bookings</li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- DASHBOARD -->
        <section id="dashboard" class="section active">
            <h1>Dashboard</h1>

            <div class="cards">
                <div class="card">Orders<br><span id="ordersCount">0</span></div>
                <div class="card">Bookings<br><span id="bookingsCount">0</span></div>
            </div>
        </section>

        <!-- ORDERS -->
        <section id="orders" class="section">

            <h1>Orders</h1>

            <button onclick="clearOrders()" class="clear-btn">
                Clear All Orders
            </button>

            <div id="ordersList"></div>

        </section>

        <!-- BOOKINGS -->
        <section id="bookings" class="section">
            <h1>Bookings</h1>
            <div id="bookingsList"></div>
        </section>

    </main>

</div>

<script src="admin.js"></script>
</body>
</html>
